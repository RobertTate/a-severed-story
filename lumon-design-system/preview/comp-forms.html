<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .form { display:flex; flex-direction:column; gap:16px; }
  .field label { display:block; font-family:var(--font-text); font-weight:700; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--fg-2); margin-bottom:6px; }
  .field input { width:100%; padding:11px 12px; border:1.5px solid var(--hairline-strong); border-radius:2px; background:var(--pure-white); font-family:var(--font-text); font-size:15px; color:var(--ink); }
  .field input:focus { outline:none; border-color:var(--lumon-blue); }
  .checks { display:flex; flex-direction:column; gap:10px; }
  .chk { display:flex; align-items:center; gap:11px; font-family:var(--font-text); font-size:15px; }
  .chk .box { width:18px; height:18px; border:1.5px solid var(--ink); border-radius:2px; flex:none; display:flex; align-items:center; justify-content:center; }
  .chk.done .box { background:var(--ink); }
  .chk.done .box::after { content:""; width:9px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translateY(-1px); }
  .chk.done .t { text-decoration: line-through; color:var(--fg-2); }
</style></head>
<body>
<div class="card pad-lg">
  <div class="cap">Form controls</div>
  <div class="form">
    <div class="field"><label>Refiner ID</label><input value="MDR-0419" /></div>
    <div class="checks">
      <div class="chk done"><span class="box"></span><span class="t">Brew a pot of coffee.</span></div>
      <div class="chk"><span class="box"></span><span class="t">Inspect terminal for irregularities.</span></div>
      <div class="chk"><span class="box"></span><span class="t">Select one record for morning listening.</span></div>
    </div>
  </div>
</div>
</body></html>
