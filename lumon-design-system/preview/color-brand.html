<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--hairline); }
  .sw { aspect-ratio: 1.6 / 1; padding: 12px 14px; display: flex; flex-direction: column; justify-content: space-between; }
  .sw .name { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; }
  .sw .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; }
  .on-dark { color: #fff; } .on-light { color: var(--ink); }
</style></head>
<body>
<div class="card pad-lg">
  <div class="cap">O&amp;D — Color Reference Chart</div>
  <div class="swatches">
    <div class="sw on-light" style="background:#F8AAB6"><span class="name">PANTONE 700&nbsp;U</span><span class="hex">#F8AAB6</span></div>
    <div class="sw on-dark"  style="background:#A25056"><span class="name">PANTONE 704&nbsp;U</span><span class="hex">#A25056</span></div>
    <div class="sw on-light" style="background:#8BE076"><span class="name">PANTONE 7487&nbsp;U</span><span class="hex">#8BE076</span></div>
    <div class="sw on-dark"  style="background:#00957E"><span class="name">PANTONE 334&nbsp;U</span><span class="hex">#00957E</span></div>
    <div class="sw on-light" style="background:#4CB4E7"><span class="name">PANTONE 298&nbsp;U</span><span class="hex">#4CB4E7</span></div>
    <div class="sw on-dark"  style="background:#235BA8"><span class="name">PANTONE 293&nbsp;U</span><span class="hex">#235BA8</span></div>
  </div>
</div>
</body></html>
