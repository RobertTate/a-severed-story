<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display:flex; flex-direction:column; }
  .r { display:flex; align-items:baseline; gap:16px; padding:7px 0; border-bottom:1px solid var(--hairline); }
  .r:last-child{border-bottom:0;}
  .r .lbl { width:118px; flex:none; font-family:var(--font-mono); font-size:10.5px; color:var(--fg-2); }
  .r .sample { font-family: var(--font-display); color: var(--fg-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style></head>
<body>
<div class="card pad-lg">
  <div class="cap">Type scale</div>
  <div class="scale">
    <div class="r"><span class="lbl">display · 64 / 300</span><span class="sample" style="font-size:40px;font-weight:300;letter-spacing:-.01em">Severance</span></div>
    <div class="r"><span class="lbl">h1 · 44 / 700</span><span class="sample" style="font-size:33px;font-weight:700;letter-spacing:-.01em">Macrodata</span></div>
    <div class="r"><span class="lbl">h2 · 32 / 700</span><span class="sample" style="font-size:26px;font-weight:700">Refinement</span></div>
    <div class="r"><span class="lbl">h3 · 24 / 600</span><span class="sample" style="font-size:21px;font-weight:600">Compliance</span></div>
    <div class="r"><span class="lbl">h4 · 19 / 700</span><span class="sample" style="font-size:18px;font-weight:700;font-family:var(--font-text)">Senior Refiner</span></div>
    <div class="r"><span class="lbl">body · 16 / 400</span><span class="sample" style="font-size:16px;font-weight:400;font-family:var(--font-text)">Please enjoy each number equally.</span></div>
    <div class="r"><span class="lbl">small · 14 / 400</span><span class="sample" style="font-size:14px;font-weight:400;font-family:var(--font-text);color:var(--fg-2)">A handshake is available upon request.</span></div>
    <div class="r"><span class="lbl">caption · 12 / 500</span><span class="sample" style="font-size:12px;font-weight:500;font-family:var(--font-text);color:var(--fg-2)">Edition 23 · Compendium of Procedures</span></div>
  </div>
</div>
</body></html>
