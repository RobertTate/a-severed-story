<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .wall { background:var(--wall); padding:34px 36px; display:flex; gap:34px; align-items:center; }
  .sign { display:flex; align-items:stretch; gap:14px; }
  .sign .pipe { width:4px; background:var(--slate); box-shadow:0 1px 0 rgba(255,255,255,0.6); }
  .sign .t { font-family:var(--font-display); font-weight:700; font-size:23px; letter-spacing:0.13em; text-transform:uppercase; line-height:1.06; color:var(--slate);
    text-shadow: 0 1px 0 rgba(255,255,255,0.7), 0 -1px 1px rgba(0,0,0,0.22); }
  .plaque { background:#4E7E82; padding:12px; border-radius:1px; }
  .plaque .inner { background:#E7E6DE; border:2px solid #9aa39f; padding:12px 18px; text-align:center; }
  .plaque .l1 { font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.1em; color:var(--ink); }
  .plaque .l2 { font-family:var(--font-display); font-weight:800; font-size:18px; letter-spacing:0.04em; color:var(--ink); margin:2px 0; }
</style></head>
<body>
<div class="card" style="padding:0">
  <div class="wall">
    <div class="sign"><span class="pipe"></span><span class="t">Storage<br>Closet</span></div>
    <div class="plaque"><div class="inner">
      <div class="l1">CEO 1987–1999</div>
      <div class="l2">PHILLIP "PIP" EAGAN</div>
      <div class="l1">1937–1999</div>
    </div></div>
  </div>
</div>
</body></html>
