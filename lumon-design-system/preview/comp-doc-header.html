<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .doc { background:var(--pantone-298); padding:22px 24px; color:var(--ink); }
  .doc .logo { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .doc .logo img { height:26px; }
  .doc h1 { font-family:var(--font-display); font-weight:700; font-size:24px; line-height:1.08; margin:0 0 9px; }
  .eyebrow { font-family:var(--font-text); font-weight:700; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:6px; }
  .striped { height:7px; color:var(--ink);
    background: repeating-linear-gradient(to bottom, currentColor 0 1px, transparent 1px 3px); }
</style></head>
<body>
<div class="card" style="padding:0">
  <div class="doc">
    <div class="logo"><img src="../assets/lumon-globe-black.png" alt="Lumon"></div>
    <h1>Senior Refiner<br>Morning Checklist</h1>
    <div class="eyebrow">Macrodata Refinement</div>
    <div class="striped"></div>
  </div>
</div>
</body></html>
