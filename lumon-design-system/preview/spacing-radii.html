<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .radii { display:flex; gap:22px; align-items:flex-end; }
  .r { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .r .box { width:84px; height:64px; background:var(--wall-cool); border:1.5px solid var(--slate); }
  .r .n { font-family:var(--font-mono); font-size:10.5px; color:var(--fg-2); text-align:center; line-height:1.3; }
</style></head>
<body>
<div class="card pad-lg">
  <div class="cap">Corner radii — crisp, mid-century</div>
  <div class="radii">
    <div class="r"><div class="box" style="border-radius:0"></div><div class="n">none · 0<br>signage</div></div>
    <div class="r"><div class="box" style="border-radius:2px"></div><div class="n">sm · 2<br>documents</div></div>
    <div class="r"><div class="box" style="border-radius:4px"></div><div class="n">md · 4<br>cards / buttons</div></div>
    <div class="r"><div class="box" style="border-radius:999px;width:120px"></div><div class="n">pill · 999<br>logo lozenge</div></div>
  </div>
</div>
</body></html>
