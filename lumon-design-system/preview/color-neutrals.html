<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(8, 1fr); border: 1px solid var(--hairline); }
  .sw { height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 9px; }
  .sw .name { font-size: 10px; font-weight: 700; letter-spacing: 0.02em; line-height: 1.1; }
  .sw .hex { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.8; }
</style></head>
<body>
<div class="card pad-lg">
  <div class="cap">Institutional Neutrals — the severed floor</div>
  <div class="scale">
    <div class="sw" style="background:#FFFFFF;color:#1A1D22"><span class="name">white</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background:#F4F3EE;color:#1A1D22"><span class="name">paper</span><span class="hex">#F4F3EE</span></div>
    <div class="sw" style="background:#EDECE6;color:#1A1D22"><span class="name">wall</span><span class="hex">#EDECE6</span></div>
    <div class="sw" style="background:#DEDCD3;color:#1A1D22"><span class="name">bone</span><span class="hex">#DEDCD3</span></div>
    <div class="sw" style="background:#C4C5C0;color:#1A1D22"><span class="name">concrete</span><span class="hex">#C4C5C0</span></div>
    <div class="sw" style="background:#9A9E9D;color:#fff"><span class="name">steel</span><span class="hex">#9A9E9D</span></div>
    <div class="sw" style="background:#6E7374;color:#fff"><span class="name">steel-dk</span><span class="hex">#6E7374</span></div>
    <div class="sw" style="background:#1A1D22;color:#fff"><span class="name">ink</span><span class="hex">#1A1D22</span></div>
  </div>
</div>
</body></html>
