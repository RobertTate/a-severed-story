<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .rows { display:flex; flex-direction:column; gap:9px; }
  .r { display:flex; align-items:center; gap:14px; }
  .r .lbl { width:120px; flex:none; font-family:var(--font-mono); font-size:11px; color:var(--fg-2); }
  .r .bar { height:14px; background:var(--lumon-blue); }
</style></head>
<body>
<div class="card pad-lg">
  <div class="cap">Spacing scale · 4px base</div>
  <div class="rows">
    <div class="r"><span class="lbl">space-1 · 4</span><span class="bar" style="width:4px"></span></div>
    <div class="r"><span class="lbl">space-2 · 8</span><span class="bar" style="width:8px"></span></div>
    <div class="r"><span class="lbl">space-3 · 12</span><span class="bar" style="width:12px"></span></div>
    <div class="r"><span class="lbl">space-4 · 16</span><span class="bar" style="width:16px"></span></div>
    <div class="r"><span class="lbl">space-5 · 24</span><span class="bar" style="width:24px"></span></div>
    <div class="r"><span class="lbl">space-6 · 32</span><span class="bar" style="width:32px"></span></div>
    <div class="r"><span class="lbl">space-7 · 48</span><span class="bar" style="width:48px"></span></div>
    <div class="r"><span class="lbl">space-8 · 64</span><span class="bar" style="width:64px"></span></div>
    <div class="r"><span class="lbl">space-9 · 96</span><span class="bar" style="width:96px"></span></div>
  </div>
</div>
</body></html>
