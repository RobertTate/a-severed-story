<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .tags { display:flex; flex-wrap:wrap; gap:10px 12px; align-items:center; }
  .tag { font-family:var(--font-text); font-weight:600; font-size:12px; padding:5px 12px; }
  .tag-contention { background:var(--steel-dark); color:#fff; font-style:italic; }
  .tag-dept { border:1.5px solid currentColor; border-radius:999px; font-weight:700; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; padding:5px 13px; }
  .tag-status { border-radius:2px; font-weight:700; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; padding:5px 11px; }
  .row2 { display:flex; flex-direction:column; gap:14px; }
</style></head>
<body>
<div class="card pad-lg">
  <div class="cap">Badges &amp; department coding</div>
  <div class="row2">
    <div class="tags">
      <span class="tag tag-contention">Contention</span>
      <span class="tag-status" style="background:var(--pantone-7487);color:var(--mdr-ink)">Complete</span>
      <span class="tag-status" style="background:var(--pantone-700);color:var(--pantone-704)">Pending</span>
      <span class="tag-status" style="background:var(--steel);color:#fff">Deferred</span>
    </div>
    <div class="tags">
      <span class="tag-dept" style="color:var(--pantone-334)">MDR</span>
      <span class="tag-dept" style="color:var(--lumon-blue)">O&amp;D</span>
      <span class="tag-dept" style="color:var(--pantone-704)">Wellness</span>
      <span class="tag-dept" style="color:var(--steel-dark)">Security</span>
    </div>
  </div>
</div>
</body></html>
