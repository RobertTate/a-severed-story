<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .logo-card { flex-direction: row; gap: 0; padding: 0; }
  .half { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 36px; }
  .light { background: var(--wall); }
  .dark  { background: var(--ink); }
  .half img { width: 210px; height: auto; display: block; }
  .tag { position: absolute; top: 12px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; }
  .half { position: relative; }
  .light .tag { color: var(--fg-3); left: 16px; }
  .dark .tag  { color: rgba(244,243,238,0.5); left: 16px; }
</style></head>
<body>
<div class="card logo-card">
  <div class="half light"><span class="tag">On light</span><img src="../assets/lumon-globe-black.png" alt="Lumon logo"></div>
  <div class="half dark"><span class="tag">On dark</span><img src="../assets/lumon-globe-white.png" alt="Lumon logo"></div>
</div>
</body></html>
