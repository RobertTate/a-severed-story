<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .ws { display:grid; grid-template-columns: repeat(3,1fr); gap:14px 18px; }
  .w .n { font-family:var(--font-mono); font-size:10px; color:var(--fg-2); margin-bottom:2px; }
  .w .s { font-family:var(--font-display); font-size:30px; line-height:1; color:var(--fg-1); }
</style></head>
<body>
<div class="card pad-lg">
  <div class="cap">Weights — Hanken Grotesk</div>
  <div class="ws">
    <div class="w"><div class="n">300 light</div><div class="s" style="font-weight:300">Kier</div></div>
    <div class="w"><div class="n">400 regular</div><div class="s" style="font-weight:400">Kier</div></div>
    <div class="w"><div class="n">500 medium</div><div class="s" style="font-weight:500">Kier</div></div>
    <div class="w"><div class="n">600 semibold</div><div class="s" style="font-weight:600">Kier</div></div>
    <div class="w"><div class="n">700 bold</div><div class="s" style="font-weight:700">Kier</div></div>
    <div class="w"><div class="n">800 extrabold</div><div class="s" style="font-weight:800">Kier</div></div>
  </div>
</div>
</body></html>
