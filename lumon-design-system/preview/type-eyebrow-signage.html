<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display:flex; flex-direction:column; gap:18px; }
  .blk .k { font-family:var(--font-mono); font-size:10.5px; color:var(--fg-2); margin-bottom:7px; }
  .eyebrow { font-family:var(--font-text); font-weight:700; font-size:13px; letter-spacing:0.22em; text-transform:uppercase; color:var(--fg-1); }
  .sig { font-family:var(--font-display); font-weight:700; font-size:26px; letter-spacing:0.14em; text-transform:uppercase; color:var(--slate); display:flex; align-items:center; gap:14px; }
  .pipe { width:3px; align-self:stretch; background:var(--slate); }
  .sigwrap { display:flex; align-items:stretch; gap:0; }
  .sigwrap .pipe { margin-right:14px; }
</style></head>
<body>
<div class="card pad-lg">
  <div class="cap">Eyebrows &amp; dimensional signage</div>
  <div class="grid">
    <div class="blk">
      <div class="k">eyebrow · 0.22em tracking · all caps</div>
      <div class="eyebrow">Minor Performance Incidents (Contentions)</div>
    </div>
    <div class="blk">
      <div class="k">signage · 0.14em tracking · pipe rule prefix</div>
      <div class="sigwrap"><span class="pipe"></span><span class="sig">Storage&nbsp;Closet</span></div>
    </div>
  </div>
</div>
</body></html>
