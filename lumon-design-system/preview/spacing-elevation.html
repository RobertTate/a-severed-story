<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .els { display:flex; gap:22px; align-items:center; flex-wrap:wrap; }
  .e { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .e .box { width:118px; height:70px; background:var(--paper); border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:10px; color:var(--fg-2); }
  .flat   { box-shadow: 0 1px 0 rgba(26,29,34,0.10); border:1px solid var(--hairline); }
  .card-e { box-shadow: 0 1px 2px rgba(26,29,34,0.10), 0 8px 24px -12px rgba(26,29,34,0.22); }
  .raised { box-shadow: 0 2px 4px rgba(26,29,34,0.12), 0 18px 40px -20px rgba(26,29,34,0.30); }
  .emboss { background:var(--wall); color:var(--slate); font-weight:700; letter-spacing:0.12em; text-shadow: 0 1px 0 rgba(255,255,255,0.7), 0 -1px 1px rgba(0,0,0,0.25); border:0; }
  .e .n { font-family:var(--font-mono); font-size:10px; color:var(--fg-2); }
</style></head>
<body>
<div class="card pad-lg" style="background:var(--wall)">
  <div class="cap">Elevation — one soft fluorescent shadow + dimensional lettering</div>
  <div class="els">
    <div class="e"><div class="box flat"></div><div class="n">flat</div></div>
    <div class="e"><div class="box card-e"></div><div class="n">card</div></div>
    <div class="e"><div class="box raised"></div><div class="n">raised</div></div>
    <div class="e"><div class="box emboss">LUMON</div><div class="n">emboss (signage)</div></div>
  </div>
</div>
</body></html>
