<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>A Severed Story · Lumon Industries</title>
  <link rel="stylesheet" type="text/css" href="lumon-design-system/colors_and_type.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-text);
      min-height: 100vh;
    }

    .cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 64px 48px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    /* a soft fluorescent overhead light — the only "depth" allowed */
    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at 50% -10%,
        rgba(255,255,255,0.06) 0%,
        rgba(255,255,255,0) 60%
      );
      pointer-events: none;
    }

    .cover__top {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 960px;
      justify-content: center;
    }
    .cover__top img { height: 32px; }
    .cover__top span {
      font-family: var(--font-text);
      font-weight: var(--w-bold);
      font-size: var(--t-eyebrow);
      letter-spacing: var(--track-eyebrow);
      text-transform: uppercase;
      color: var(--paper);
    }

    .cover__main {
      text-align: center;
      max-width: 720px;
    }

    .cover__eyebrow {
      font-family: var(--font-text);
      font-weight: var(--w-bold);
      font-size: var(--t-eyebrow);
      letter-spacing: var(--track-eyebrow);
      text-transform: uppercase;
      color: var(--steel);
      margin-bottom: 32px;
    }

    .cover__title {
      font-family: var(--font-display);
      font-weight: var(--w-bold);
      font-size: clamp(56px, 9vw, 104px);
      line-height: 1.0;
      letter-spacing: -0.015em;
      color: var(--paper);
      margin: 0 0 28px;
    }

    .cover__striped {
      height: 9px;
      width: 96px;
      margin: 0 auto 28px;
      background: repeating-linear-gradient(
        to bottom,
        var(--paper) 0 1px,
        transparent 1px 3px
      );
    }

    .cover__subtitle {
      font-family: var(--font-display);
      font-weight: var(--w-light);
      font-style: italic;
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.35;
      color: var(--bone);
      margin: 0 0 48px;
    }

    .cover__edition {
      font-family: var(--font-text);
      font-weight: var(--w-bold);
      font-size: var(--t-eyebrow);
      letter-spacing: var(--track-eyebrow);
      text-transform: uppercase;
      color: var(--steel);
      margin-bottom: 24px;
    }

    .cover__cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      background: var(--paper);
      color: var(--ink);
      text-decoration: none;
      font-family: var(--font-text);
      font-weight: var(--w-bold);
      font-size: var(--t-eyebrow);
      letter-spacing: var(--track-eyebrow);
      text-transform: uppercase;
      border: none;
      border-radius: 0;
      box-shadow: 0 1px 0 rgba(0,0,0,0.5), 0 12px 32px -16px rgba(255,255,255,0.05);
      transition: background-color 200ms ease;
    }
    .cover__cta:hover { background: var(--wall); }
    .cover__cta::after {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--ink);
    }

    .cover__footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 960px;
      text-align: center;
    }
    .cover__footer .property {
      font-family: var(--font-text);
      font-weight: var(--w-bold);
      font-size: var(--t-caption);
      letter-spacing: var(--track-eyebrow);
      text-transform: uppercase;
      color: var(--steel);
    }
    .cover__footer .attribution {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: var(--w-light);
      font-size: var(--t-small);
      color: var(--steel-dark);
    }

    /* ---- Mobile (portrait phones / narrow tablets) ---- */
    @media (max-width: 720px) {
      .cover {
        justify-content: center;
        gap: 72px;
        padding: 48px 24px;
      }
      .cover__title {
        font-size: clamp(56px, 14vw, 88px);
        line-height: 0.98;
      }
      .cover__subtitle {
        font-size: 17px;
        margin-bottom: 40px;
      }
      .cover__eyebrow {
        margin-bottom: 24px;
      }
      .cover__main {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="cover">
    <div class="cover__top">
      <img src="lumon-design-system/assets/lumon-globe-white.png" alt="Lumon Industries" />
      <span>Lumon Industries</span>
    </div>

    <div class="cover__main">
      <div class="cover__eyebrow">An Orientation Guide</div>
      <h1 class="cover__title">A Severed Story</h1>
      <div class="cover__striped"></div>
      <p class="cover__subtitle">
        A Tabletop Roleplaying Handbook<br />
        for Severed Floor Employees
      </p>
      <a class="cover__cta" href="a-severed-story.html">Begin Orientation</a>
    </div>

    <div class="cover__footer">
      <div class="property">Property of Lumon Industries</div>
      <div class="attribution">A passion project by Robert Tate. Praise Kier.</div>
    </div>
  </main>
</body>

</html>
